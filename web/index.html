<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Траты">
  <title>Траты</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <!--
    index.html — единый экран (Editorial + motion), порт макета «Траты v2.dc.html»
    из Claude Design в vanilla JS. Собран РЯДОМ со старыми 4 страницами (не
    заменяет их) и работает на данных-заглушках — проводка к /api/* делается
    отдельным шагом. Визуал/анимации 1:1 с макетом. Экран — единственный
    носитель состояния; никакого фреймворка, только точечный ре-рендер, чтобы
    CSS-анимации (screenIn/rowIn/flyUp/…) проигрывались там же, где в макете.
  -->
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #0a0a0a; }
    body { font-family: -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
    input, button, textarea, select { font-family: inherit; }
    input::placeholder, textarea::placeholder { color: #f0f0f0; opacity: 0.18; }
    input:focus, textarea:focus, select:focus { outline: none; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    select option { background: #101010; color: #f0f0f0; }

    /* Тихие капсовые подписи — экранные (крупнее) и полевые (мельче). */
    .lbl-h { text-transform: uppercase; opacity: 0.4; letter-spacing: 0.14em; font-weight: 500; font-size: 0.7rem; }
    .lbl-f { text-transform: uppercase; opacity: 0.4; letter-spacing: 0.1em; font-size: 0.66rem; }

    @keyframes screenIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    @keyframes flyUp { 0% { transform: translateY(28px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    @keyframes checkPop { 0% { transform: scale(0); } 60% { transform: scale(1.18); } 100% { transform: scale(1); } }
    @keyframes shakeX { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
    @keyframes toastIn { from { transform: translate(-50%, 34px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    @keyframes barShrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
    @keyframes modalIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes rowIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./config.js"></script>
  <script>
  (() => {
    'use strict';

    const ACC = '#0abab5';
    const SPRING = 'cubic-bezier(0.34,1.56,0.64,1)';
    const EASE_OUT = 'cubic-bezier(0.22,1,0.36,1)';

    // ── Данные из API (счета/дни грузятся по сети; загрузчики — внизу файла) ──
    // Реальные валюты системы (THB/USDT/RUB/VND), не хардкод ₽/$/€ из макета.
    const CURRENCY_DISPLAY = { THB: '฿', USDT: 'USDT', RUB: '₽', VND: '₫' };
    const curSymbol = (c) => CURRENCY_DISPLAY[c] || c || '';
    const typeName = { income: 'Пришло', expense: 'Расход', exchange: 'Обмен', transfer: 'Перевод' };
    const QUEUE_KEY = 'expenseQueue';

    const readLS = (k) => { try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch { return null; } };
    const writeLS = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

    const state = {
      screen: 'record', settingsOpen: false,
      recordText: '', recordStatus: null,
      dayDate: AppConfig.today(), dayData: {},
      evType: 'expense', evFrom: null, evTo: null,
      evAmount: '', evAmount2: '', evNote: '', evDate: AppConfig.today(),
      toast: null, toastUndo: null,
      accounts: [], primary: null, balUpdatedAt: null, accountsLoaded: false,
      pendingUndoEventId: null,
      recurring: [], recurringLoaded: false, paySheet: null, pendingRecurringUndo: null,
      recToday: null, recLead: 3, recExpanded: null,
    };
    let raf = null, toastTimer = null, lastAccSig = '';

    // Тёплый старт: балансы из локального кэша, пока сеть догоняет.
    const _cachedBal = readLS('cache:balances');
    if (_cachedBal && Array.isArray(_cachedBal.accounts)) {
      state.accounts = _cachedBal.accounts;
      state.primary = _cachedBal.primary || null;
      state.balUpdatedAt = _cachedBal.updated_at || null;
      state.accountsLoaded = state.accounts.length > 0;
    }

    // ── Хелперы ─────────────────────────────────────────────────────────
    const fmt = (n) => Number(n).toLocaleString('ru-RU');
    const disp = (amount, cur) => fmt(amount) + ' ' + cur;
    const curOf = (id) => { const a = state.accounts.find((x) => x.id === id); return a ? curSymbol(a.currency) : ''; };
    const ea = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const el = (id) => document.getElementById(id);

    const ICONS = {
      plus:     '<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>',
      events:   '<polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path>',
      balances: '<rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line>',
      day:      '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>',
      recurring:'<polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>',
      gear:     '<circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>',
      chevL:    '<polyline points="15 18 9 12 15 6"></polyline>',
      chevR:    '<polyline points="9 18 15 12 9 6"></polyline>',
      check:    '<polyline points="20 6 9 17 4 12"></polyline>',
    };
    const svg = (name, size, stroke) =>
      `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${stroke || 'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`;

    // ── Каркас: строится один раз ───────────────────────────────────────
    const navBtn = (id, icon) =>
      `<button id="nav-${id}" style="display:flex;align-items:center;justify-content:center;width:32px;height:44px;background:none;border:none;cursor:pointer;padding:0;color:#f0f0f0;opacity:0.35;transition:opacity .15s ease,color .15s ease,transform .4s ${SPRING};">${svg(icon, 23)}</button>`;

    function mount() {
      el('app').innerHTML = `
        <div style="min-height:100dvh;background:#0a0a0a;color:#f0f0f0;font-size:18px;display:flex;justify-content:center;">
          <div style="width:100%;max-width:480px;min-height:100dvh;display:flex;flex-direction:column;padding:max(env(safe-area-inset-top),0.9rem) 1.6rem calc(env(safe-area-inset-bottom) + 1.5rem);">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0 2rem;">
              <div style="display:flex;gap:1.4rem;">
                ${navBtn('record', 'plus')}
                ${navBtn('events', 'events')}
                ${navBtn('balances', 'balances')}
                ${navBtn('day', 'day')}
                ${navBtn('recurring', 'recurring')}
              </div>
              <button id="nav-settings" style="display:flex;align-items:center;justify-content:center;width:32px;height:44px;background:none;border:none;cursor:pointer;padding:0;color:#f0f0f0;opacity:0.4;transition:transform .4s ${SPRING};">${svg('gear', 22)}</button>
            </div>
            <div id="screen-host" style="flex:1;display:flex;flex-direction:column;"></div>
          </div>
        </div>
        <div id="toast-host"></div>
        <div id="settings-host"></div>
        <div id="paysheet-host"></div>`;

      // press-эффекты нав-кнопок (тап → scale, у шестерёнки ещё поворот)
      pressFx(el('nav-settings'), 'scale(0.82) rotate(40deg)');
      ['record', 'events', 'balances', 'day', 'recurring'].forEach((name) => {
        const b = el('nav-' + name);
        pressFx(b, 'scale(0.78)');
        b.addEventListener('click', () => go(name));
      });
      el('nav-settings').addEventListener('click', openSettings);

      setActiveScreen(state.screen);
    }

    // Пружинный отклик на нажатие: держим scale, пока кнопка «pressed».
    function pressFx(node, transform) {
      const down = () => { node.style.transform = transform; };
      const up = () => { node.style.transform = ''; };
      node.addEventListener('pointerdown', down);
      node.addEventListener('pointerup', up);
      node.addEventListener('pointerleave', up);
      node.addEventListener('pointercancel', up);
    }

    function updateNav() {
      ['record', 'events', 'balances', 'day', 'recurring'].forEach((name) => {
        const b = el('nav-' + name);
        const active = state.screen === name;
        b.style.color = active ? ACC : '#f0f0f0';
        b.style.opacity = active ? '1' : '0.35';
      });
    }

    // ── Переключение экрана (проигрывает screenIn) ──────────────────────
    const wrapStyle = {
      record:   `flex:1;display:flex;flex-direction:column;justify-content:center;padding-bottom:3rem;animation:screenIn .34s ${EASE_OUT};`,
      balances: `animation:screenIn .34s ${EASE_OUT};`,
      day:      `animation:screenIn .34s ${EASE_OUT};`,
      events:   `animation:screenIn .34s ${EASE_OUT};display:flex;flex-direction:column;gap:1.75rem;padding-bottom:1rem;`,
      recurring:`animation:screenIn .34s ${EASE_OUT};display:flex;flex-direction:column;gap:1.25rem;`,
    };

    function go(name) {
      if (name === state.screen) return;
      setActiveScreen(name);
    }
    function setActiveScreen(name) {
      state.screen = name;
      state.recordStatus = null;
      if (raf) { cancelAnimationFrame(raf); raf = null; }
      const host = el('screen-host');
      const s = document.createElement('div');
      s.id = 'screen';
      s.style.cssText = wrapStyle[name];
      host.innerHTML = '';
      host.appendChild(s);
      renderBody();
      updateNav();
      if (name === 'balances') { startCount(); loadBalances(); }
      else if (name === 'events') { if (!state.accountsLoaded) loadBalances(); }
      else if (name === 'day') { loadDay(state.dayDate); }
      else if (name === 'recurring') loadRecurring();
    }
    // Ре-рендер только тела экрана (#screen сохраняется → screenIn НЕ повторяется,
    // но дочерние анимации rowIn/flyUp/shakeX проигрываются заново).
    function renderBody() {
      const s = el('screen');
      s.innerHTML = BODY[state.screen]();
      WIRE[state.screen]();
    }

    // ── RECORD ──────────────────────────────────────────────────────────
    function statusHtml() {
      const st = state.recordStatus;
      if (!st) return '';
      if (st.type === 'success') {
        return `<div style="display:flex;align-items:center;gap:0.7rem;animation:flyUp .45s ${SPRING};">
          <span style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#5fd37e;flex-shrink:0;animation:checkPop .4s .1s both ${SPRING};">${svg('check', 15, '#0a0a0a').replace('stroke-width="2"', 'stroke-width="3.5"')}</span>
          <span style="font-size:0.95rem;color:#cfefd6;">${ea(st.text)}</span>
        </div>`;
      }
      return `<div style="color:#e87171;font-size:0.95rem;animation:shakeX .4s ease;">${ea(st.text)}</div>`;
    }
    BODY.record = () => {
      const empty = state.recordText.trim() === '';
      return `
        <div class="lbl-h" style="margin-bottom:2rem;">Запись траты</div>
        <input id="rec-input" value="${ea(state.recordText)}" placeholder="кофе 350" enterkeyhint="done" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
          style="width:100%;background:transparent;border:none;border-bottom:2px solid #262626;border-radius:0;padding:0.4rem 0 1rem;font-size:2.3rem;font-weight:600;letter-spacing:-0.02em;color:#f0f0f0;margin-bottom:2rem;font-variant-numeric:tabular-nums;transition:border-color .2s ease;">
        <button id="rec-btn" ${empty ? 'disabled' : ''}
          style="width:100%;background:${ACC};color:#0a0a0a;border:none;border-radius:4px;padding:1.25rem;font-size:1rem;font-weight:600;letter-spacing:0.02em;text-transform:uppercase;cursor:pointer;transition:transform .42s ${SPRING},opacity .18s ease,box-shadow .3s ease;opacity:${empty ? 0.4 : 1};">Записать</button>
        <div id="rec-status" style="min-height:3rem;margin-top:1.4rem;display:flex;align-items:center;">${statusHtml()}</div>`;
    };
    WIRE.record = () => {
      const input = el('rec-input');
      const btn = el('rec-btn');
      input.addEventListener('focus', () => { input.style.borderBottomColor = ACC; });
      input.addEventListener('blur', () => { input.style.borderBottomColor = '#262626'; });
      input.addEventListener('input', (e) => {
        state.recordText = e.target.value;
        if (state.recordStatus) { state.recordStatus = null; el('rec-status').innerHTML = ''; }
        const empty = state.recordText.trim() === '';
        btn.disabled = empty;
        btn.style.opacity = empty ? '0.4' : '1';
      });
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submitRecord(); } });
      btn.addEventListener('click', submitRecord);
      pressBtn(btn);
    };
    // Запись траты: парсинг суммы — на бэке (не дублируем локально). Локально
    // только кладём сырой text в оффлайн-очередь (flush на online/focus/pageshow/
    // 30s/старт) и оптимистично показываем зелёную галочку.
    function submitRecord() {
      const t = state.recordText.trim();
      if (!t) return;
      if (!AppConfig.token()) {
        state.recordStatus = { type: 'error', text: 'Заполни токен в настройках' };
        el('rec-status').innerHTML = statusHtml();
        openSettings();
        return;
      }
      state.recordText = '';
      state.recordStatus = { type: 'success', text: 'Записано · ' + t };
      enqueue(t);
      renderBody(); // очистить поле, проиграть flyUp/checkPop
      flush();
    }

    // ── BALANCES ────────────────────────────────────────────────────────
    BODY.balances = () => {
      const primary = state.primary;
      const accts = (state.accounts || []).filter((a) => !a.hidden)
        .slice().sort((a, b) => ((a.id === primary ? -1 : 0) - (b.id === primary ? -1 : 0)));
      let rows;
      if (accts.length === 0) {
        rows = '<div style="opacity:0.3;padding:2rem 0;font-size:1.05rem;">загрузка…</div>';
      } else {
        rows = accts.map((a) => {
          const isMain = !!primary && a.id === primary;
          const cur = curSymbol(a.currency);
          const nameRow = `<div style="display:flex;align-items:baseline;gap:0.5rem;margin-bottom:0.4rem;">
              <span style="text-transform:uppercase;letter-spacing:0.1em;font-size:0.68rem;opacity:0.4;">${ea(a.name || a.id)}</span>
            </div>`;
          const rowStyle = isMain ? 'padding:0 0 1.6rem;border-bottom:1px solid #1f1f1f;' : 'padding:1.4rem 0;border-bottom:1px solid #141414;';
          const amtStyle = `font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-0.03em;line-height:1;font-size:${isMain ? '3.2rem' : '1.75rem'};color:${isMain ? ACC : '#f0f0f0'};`;
          return `<div style="${rowStyle}">${nameRow}<div class="bal-amt" data-amount="${a.amount}" data-cur="${ea(cur)}" style="${amtStyle}">${disp(a.amount || 0, cur)}</div></div>`;
        }).join('');
      }
      const updated = state.balUpdatedAt ? fmtTime(state.balUpdatedAt) : '—';
      return `<div class="lbl-h" style="margin-bottom:1.75rem;">Балансы</div>
        <div>${rows}</div>
        <div style="margin-top:2rem;opacity:0.35;font-size:0.78rem;letter-spacing:0.02em;">Обновлено ${updated}</div>`;
    };
    WIRE.balances = () => {};
    // Count-up при входе на экран: читает data-amount из реальных значений; тик —
    // целочисленный твин, финальный кадр — точное значение (сохраняет копейки USDT).
    function startCount() {
      if (raf) cancelAnimationFrame(raf);
      const els = [...document.querySelectorAll('.bal-amt')];
      const t0 = performance.now(), dur = 950;
      const tick = (now) => {
        const p = Math.min(1, Math.max(0, (now - t0) / dur));
        const e = 1 - Math.pow(1 - p, 3);
        els.forEach((n) => {
          const target = +n.dataset.amount;
          const v = p < 1 ? Math.round(target * e) : target;
          n.textContent = disp(v, n.dataset.cur);
        });
        if (p < 1) raf = requestAnimationFrame(tick); else raf = null;
      };
      raf = requestAnimationFrame(tick);
    }

    // ── DAY ─────────────────────────────────────────────────────────────
    // Дата абсолютная (state.dayDate, YYYY-MM-DD по активной зоне), не offset.
    BODY.day = () => {
      const date = state.dayDate;
      const today = AppConfig.today();
      const data = state.dayData[date] || null;
      const expenses = data ? (data.expenses || []) : [];
      const totals = data ? (data.totals || (data.total ? { THB: data.total } : {})) : {};
      const [y, m, d] = date.split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      const isToday = date === today, isYest = date === addDays(today, -1);
      const dayLabel = isToday ? 'Сегодня' : isYest ? 'Вчера' : dt.toLocaleDateString('ru-RU', { timeZone: 'UTC', day: '2-digit', month: '2-digit' });
      const daySub = dt.toLocaleDateString('ru-RU', { timeZone: 'UTC', weekday: 'long', day: 'numeric', month: 'long' });
      const nextDisabled = date >= today;
      const rows = expenses.map((e, i) =>
        `<div style="display:flex;align-items:baseline;justify-content:space-between;padding:1.05rem 0;border-bottom:1px solid #171717;animation:rowIn .38s both ${EASE_OUT};animation-delay:${i * 55}ms;">
          <span style="opacity:0.72;">${ea(e.description)}</span>
          <span style="font-weight:600;font-size:1.5rem;letter-spacing:-0.01em;font-variant-numeric:tabular-nums;">${disp(e.amount, curSymbol(e.currency))}</span>
        </div>`).join('');
      const totalRows = Object.entries(totals).filter(([, v]) => v > 0).map(([cur, v]) =>
        `<div style="display:flex;align-items:baseline;justify-content:space-between;margin-top:2rem;">
            <span style="text-transform:uppercase;opacity:0.4;letter-spacing:0.12em;font-size:0.7rem;">Итого</span>
            <span style="font-weight:600;font-size:2.6rem;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;">${disp(v, curSymbol(cur))}</span>
          </div>`).join('');
      const footer = expenses.length === 0
        ? '<div style="opacity:0.3;padding:3rem 0;font-size:1.1rem;">Нет трат</div>'
        : totalRows;
      const arrow = (id, icon, disabled) =>
        `<button id="${id}" ${disabled ? 'disabled' : ''} style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:none;border:1px solid #262626;border-radius:4px;color:#f0f0f0;cursor:pointer;padding:0;opacity:${disabled ? 0.3 : 1};transition:transform .4s ${SPRING};">${svg(icon, 18)}</button>`;
      return `<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;">
          <div>
            <div style="font-weight:600;font-size:1.9rem;letter-spacing:-0.02em;">${dayLabel}</div>
            <div style="opacity:0.4;font-size:0.78rem;margin-top:0.35rem;letter-spacing:0.02em;">${daySub}</div>
          </div>
          <div style="display:flex;gap:0.4rem;">${arrow('day-prev', 'chevL', false)}${arrow('day-next', 'chevR', nextDisabled)}</div>
        </div>
        <div>${rows}</div>${footer}`;
    };
    WIRE.day = () => {
      const prev = el('day-prev'), next = el('day-next');
      prev.addEventListener('click', () => { state.dayDate = addDays(state.dayDate, -1); renderBody(); loadDay(state.dayDate); });
      next.addEventListener('click', () => { if (state.dayDate < AppConfig.today()) { state.dayDate = addDays(state.dayDate, 1); renderBody(); loadDay(state.dayDate); } });
      pressBtn(prev, 'scale(0.85)'); pressBtn(next, 'scale(0.85)');
    };

    // ── EVENTS ──────────────────────────────────────────────────────────
    const seg = (t) => ({ bar: state.evType === t ? ACC : 'transparent', color: state.evType === t ? '#f0f0f0' : 'rgba(240,240,240,0.4)' });
    BODY.events = () => {
      const showFrom = ['expense', 'exchange', 'transfer'].includes(state.evType);
      const showTo = ['income', 'exchange', 'transfer'].includes(state.evType);
      const showAmount2 = state.evType === 'exchange';
      const amount1Label = state.evType === 'exchange' ? 'Отдал' : 'Сумма';
      const amount1Unit = showFrom ? curOf(state.evFrom) : curOf(state.evTo);
      const amount2Unit = curOf(state.evTo);
      const fromLabel = (state.evType === 'exchange' || state.evType === 'transfer') ? 'Откуда' : 'Счёт';

      const tab = (t, label) => { const c = seg(t); return `<button data-type="${t}" style="background:none;border:none;padding:0 0 0.75rem;font-size:0.95rem;font-weight:600;cursor:pointer;border-bottom:2px solid ${c.bar};color:${c.color};margin-bottom:-1px;transition:color .15s;">${label}</button>`; };
      const tabs = `<div style="display:flex;gap:1.5rem;border-bottom:1px solid #171717;">
        ${tab('income', 'Пришло')}${tab('expense', 'Расход')}${tab('exchange', 'Обмен')}${tab('transfer', 'Перевод')}</div>`;

      // Выбор счёта — грид карточек с переносом строк (гибрид авто-ширины,
      // портирован из Claude Design). Имя сверху, баланс снизу; выбранная —
      // бирюзовая рамка + подсветка. flex-wrap держит оба списка «Обмена» без скролла.
      const accList = (selId, role) => {
        const cards = (state.accounts || []).filter((a) => !a.hidden).map((a) => {
          const on = selId === a.id;
          return `<button data-role="${role}" data-id="${a.id}" style="display:flex;flex-direction:column;gap:4px;align-items:flex-start;text-align:left;background:${on ? 'rgba(10,186,181,0.1)' : '#111'};border:1px solid ${on ? ACC : '#1c1c1c'};border-radius:12px;padding:0.65rem 0.9rem;cursor:pointer;transition:transform .25s ${SPRING},background .2s,border-color .2s;color:#f0f0f0;">
            <span style="font-size:1rem;font-weight:${on ? 600 : 500};color:${on ? ACC : '#f0f0f0'};">${ea(a.name)}</span>
            <span style="font-size:0.75rem;opacity:0.45;font-variant-numeric:tabular-nums;">${disp(a.amount, curSymbol(a.currency))}</span>
          </button>`;
        }).join('');
        return `<div style="display:flex;flex-wrap:wrap;gap:0.55rem;">${cards}</div>`;
      };
      const fromBlock = showFrom ? `<div><div class="lbl-f" style="margin-bottom:0.6rem;">${fromLabel}</div>${accList(state.evFrom, 'from')}</div>` : '';
      const toBlock = showTo ? `<div><div class="lbl-f" style="margin-bottom:0.6rem;">Куда</div>${accList(state.evTo, 'to')}</div>` : '';

      const amountField = (id, label, unit, val) =>
        `<div style="flex:1;"><div class="lbl-f" style="margin-bottom:0.5rem;">${label}</div>
          <div style="display:flex;align-items:baseline;gap:0.4rem;border-bottom:2px solid #262626;padding-bottom:0.5rem;">
            <input id="${id}" value="${ea(val)}" placeholder="0" inputmode="decimal" style="flex:1;min-width:0;background:transparent;border:none;padding:0;font-size:2rem;font-weight:600;letter-spacing:-0.02em;color:#f0f0f0;font-variant-numeric:tabular-nums;">
            <span style="opacity:0.4;font-size:1.1rem;">${unit}</span>
          </div></div>`;
      const amounts = `<div style="display:flex;gap:1.5rem;">
        ${amountField('ev-amount', amount1Label, amount1Unit, state.evAmount)}
        ${showAmount2 ? amountField('ev-amount2', 'Получил', amount2Unit, state.evAmount2) : ''}</div>`;

      const note = `<div><div class="lbl-f" style="margin-bottom:0.5rem;">Заметка</div>
        <input id="ev-note" value="${ea(state.evNote)}" placeholder="необязательно" style="width:100%;background:transparent;border:none;border-bottom:1px solid #262626;border-radius:0;padding:0.4rem 0 0.6rem;font-size:1.05rem;color:#f0f0f0;"></div>`;
      const date = `<div><div class="lbl-f" style="margin-bottom:0.5rem;">Дата</div>
        <input id="ev-date" type="date" value="${ea(state.evDate)}" style="width:100%;background:transparent;border:none;border-bottom:1px solid #262626;border-radius:0;padding:0.4rem 0 0.6rem;font-size:1.05rem;color:#f0f0f0;color-scheme:dark;"></div>`;
      const submit = `<button id="ev-submit" style="width:100%;background:${ACC};color:#0a0a0a;border:none;border-radius:4px;padding:1.2rem;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:0.02em;cursor:pointer;transition:transform .42s ${SPRING},box-shadow .3s;">Записать</button>`;

      return `<div class="lbl-h">Новое событие</div>${tabs}${fromBlock}${toBlock}${amounts}${note}${date}${submit}`;
    };
    WIRE.events = () => {
      document.querySelectorAll('#screen [data-type]').forEach((b) =>
        b.addEventListener('click', () => { state.evType = b.dataset.type; state.evFrom = null; state.evTo = null; state.evAmount = ''; state.evAmount2 = ''; renderBody(); }));
      document.querySelectorAll('#screen [data-role]').forEach((b) =>
        b.addEventListener('click', () => { state[b.dataset.role === 'from' ? 'evFrom' : 'evTo'] = b.dataset.id; renderBody(); }));
      const bind = (id, key) => { const n = el(id); if (n) n.addEventListener('input', (e) => { state[key] = e.target.value; }); };
      bind('ev-amount', 'evAmount'); bind('ev-amount2', 'evAmount2'); bind('ev-note', 'evNote'); bind('ev-date', 'evDate');
      const underline = (id) => { const n = el(id); if (!n) return; n.addEventListener('focus', () => { n.style.borderBottomColor = ACC; }); n.addEventListener('blur', () => { n.style.borderBottomColor = '#262626'; }); };
      underline('ev-note'); underline('ev-date');
      const sub = el('ev-submit');
      sub.addEventListener('click', submitEvent);
      pressBtn(sub);
    };
    // POST /api/event: тело по типу (income→to, expense→from, transfer→from+to,
    // exchange→from+to+amount_to). Backdate at = zonedNoonISO(date) только если
    // дата != сегодня. Успех → тост с undo (DELETE /api/event/last).
    async function submitEvent() {
      const type = state.evType;
      const amt = parseAmount(state.evAmount);
      const amt2 = parseAmount(state.evAmount2);
      let ok = false;
      if (type === 'income') ok = !!state.evTo && amt !== null;
      else if (type === 'expense') ok = !!state.evFrom && amt !== null;
      else if (type === 'transfer') ok = !!state.evFrom && !!state.evTo && state.evFrom !== state.evTo && amt !== null;
      else if (type === 'exchange') ok = !!state.evFrom && !!state.evTo && state.evFrom !== state.evTo && amt !== null && amt2 !== null;
      if (!ok) { showToast('Заполни счёт и сумму'); return; }

      const payload = { type, amount: amt };
      if (type === 'income') payload.to = state.evTo;
      if (type === 'expense') payload.from = state.evFrom;
      if (type === 'transfer') { payload.from = state.evFrom; payload.to = state.evTo; }
      if (type === 'exchange') { payload.from = state.evFrom; payload.to = state.evTo; payload.amount = amt; payload.amount_to = amt2; }
      const note = state.evNote.trim();
      if (note) payload.note = note;
      const today = AppConfig.today();
      if (state.evDate && state.evDate !== today) payload.at = AppConfig.zonedNoonISO(state.evDate);

      try {
        const res = await api('POST', '/api/event', payload);
        if (!res.ok) {
          let d = ''; try { d = (await res.json()).error || ''; } catch {}
          showToast('Ошибка ' + res.status + (d ? ' · ' + d : ''));
          return;
        }
        const data = await res.json();
        applyBalancesObj(data.balances);
        state.pendingUndoEventId = data.event && data.event.id ? data.event.id : null;
        state.evAmount = ''; state.evAmount2 = ''; state.evNote = '';
        renderBody();
        showToast(eventSummary(data.event || payload), state.pendingUndoEventId ? { undo: undoLast } : {});
      } catch {
        showToast('Нет соединения');
      }
    }

    // ── RECURRING (payday-бакеты) ───────────────────────────────────────
    // Кастомный SVG-набор статус-иконок по статусу из GET /api/recurring. Единый
    // язык: кольцо-оправа r=9.25 + внутренний знак, штрих 1.75, viewBox 24, ровный
    // baseline. Ровно пять состояний payday-модели, каждое отличимо с одного
    // взгляда: upcoming — часы (ждёт окна), due — залитая точка (активен сейчас),
    // paid — диск+галка (внёс норму), partial — нижний полукруг (внёс часть),
    // overdue — восклицание (пропущен срок).
    const REC_COLOR = {
      upcoming: '#8b9196', due: ACC, paid: '#5fd37e', partial: ACC, overdue: '#e87171',
    };
    function recIcon(status, px) {
      const c = REC_COLOR[status] || REC_COLOR.upcoming;
      const ring = `<circle cx="12" cy="12" r="9.25" fill="none" stroke="${c}" stroke-width="1.75"/>`;
      let disc = '', mark = '';
      if (status === 'paid') {
        disc = `<circle cx="12" cy="12" r="9.25" fill="${c}" fill-opacity="0.14"/>`;
        mark = `<path d="M7.9 12.4 l2.7 2.7 L16.3 8.9" fill="none" stroke="${c}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>`;
      } else if (status === 'partial') {
        disc = `<path d="M2.75 12 A9.25 9.25 0 0 0 21.25 12 Z" fill="${c}" fill-opacity="0.9"/>`;
        mark = `<line x1="2.75" y1="12" x2="21.25" y2="12" stroke="${c}" stroke-width="1.75" stroke-linecap="round"/>`;
      } else if (status === 'due') {
        disc = `<circle cx="12" cy="12" r="9.25" fill="${c}" fill-opacity="0.12"/>`;
        mark = `<circle cx="12" cy="12" r="3.6" fill="${c}"/>`;
      } else if (status === 'overdue') {
        disc = `<circle cx="12" cy="12" r="9.25" fill="${c}" fill-opacity="0.1"/>`;
        mark = `<line x1="12" y1="6.9" x2="12" y2="12.9" stroke="${c}" stroke-width="1.9" stroke-linecap="round"/><circle cx="12" cy="16" r="1.05" fill="${c}"/>`;
      } else { // upcoming — часы
        mark = `<path d="M12 12 V7.3 M12 12 L15.3 13.5" fill="none" stroke="${c}" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="1.15" fill="${c}"/>`;
      }
      const s = px || 30;
      return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;display:block;">${disc}${ring}${mark}</svg>`;
    }
    // Дата YYYY-MM-DD → «20 июля» (UTC-парс, только форматирование; вся
    // календарная логика статусов — на бэке).
    function fmtDate(ymd) {
      if (!ymd) return '';
      const [y, m, d] = String(ymd).split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      return dt.toLocaleDateString('ru-RU', { timeZone: 'UTC', day: 'numeric', month: 'long' });
    }
    // Ближайшее наступление payday (5/20) от today. strict=false → включая сам
    // today (для «сколько дней до бакета»); strict=true → строго в будущем (для
    // даты переноса). Число клампится к длине месяца. Только для группировки/
    // переноса на фронте — статусы по-прежнему считает бэк.
    const _pad2 = (x) => String(x).padStart(2, '0');
    const _domClamp = (y, m, day) => Math.min(day, new Date(Date.UTC(y, m, 0)).getUTCDate());
    function nextPaydayYMD(todayYMD, payday, strict) {
      const [y, m, d] = String(todayYMD).split('-').map(Number);
      const dThis = _domClamp(y, m, payday);
      const hitThis = strict ? d < dThis : d <= dThis;
      if (hitThis) return `${y}-${_pad2(m)}-${_pad2(dThis)}`;
      let ny = y, nm = m + 1; if (nm > 12) { nm = 1; ny += 1; }
      return `${ny}-${_pad2(nm)}-${_pad2(_domClamp(ny, nm, payday))}`;
    }
    function daysBetweenYMD(aYMD, bYMD) {
      const [ay, am, ad] = String(aYMD).split('-').map(Number);
      const [by, bm, bd] = String(bYMD).split('-').map(Number);
      return Math.round((Date.UTC(by, bm - 1, bd) - Date.UTC(ay, am - 1, ad)) / 86400000);
    }
    // Подпись под именем платежа по статусу payday-модели. Никаких owed —
    // тело кредита в этом экране не ведём (правило 8 CLAUDE.md).
    function recSub(item) {
      const cur = curSymbol(item.currency);
      switch (item.status) {
        case 'paid':     return 'внесено';
        case 'partial':  return `осталось ${disp(item.remaining, cur)}`;
        case 'due':      return `оплатить до ${fmtDate(item.due_date)}`;
        case 'upcoming': return item.days_until != null
                                  ? `${fmtDate(item.due_date)} · через ${item.days_until} дн.`
                                  : `к ${fmtDate(item.due_date)}`;
        case 'overdue':  return `просрочено с ${fmtDate(item.due_date)}`;
        default:         return '';
      }
    }
    // Одна карточка платежа (общая для бакетов и секции «Просрочено»).
    function recRow(item, i) {
      const cur = curSymbol(item.currency);
      const amtColor = item.status === 'paid' ? '#5fd37e' : '#f0f0f0';
      return `<button data-id="${ea(item.id)}" style="display:flex;align-items:center;gap:0.9rem;width:100%;text-align:left;background:#111;border:1px solid #1c1c1c;border-radius:12px;padding:1rem 1.1rem;cursor:pointer;color:#f0f0f0;animation:rowIn .38s both ${EASE_OUT};animation-delay:${i * 55}ms;transition:transform .25s ${SPRING},border-color .2s;">
        ${recIcon(item.status, 30)}
        <div style="flex:1;min-width:0;">
          <div style="font-size:1.05rem;font-weight:600;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ea(item.name || item.id)}</div>
          <div style="opacity:0.45;font-size:0.78rem;margin-top:0.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ea(recSub(item))}</div>
        </div>
        <div style="flex-shrink:0;font-weight:600;font-size:1.35rem;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:${amtColor};">${disp(item.amount, cur)}</div>
      </button>`;
    }
    // Секция «Просрочено» — всегда наверху и раскрыта, когда есть overdue.
    function recOverdueSection(list) {
      const rows = list.map((item, i) => recRow(item, i)).join('');
      return `<div style="margin-bottom:0.4rem;">
        <div style="display:flex;align-items:baseline;gap:0.6rem;margin-bottom:0.75rem;">
          <span style="text-transform:uppercase;letter-spacing:0.12em;font-size:0.7rem;font-weight:600;color:#e87171;">Просрочено</span>
          <span style="opacity:0.4;font-size:0.72rem;">${list.length}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.7rem;">${rows}</div>
      </div>`;
    }
    // Бакет одного payday: заголовок-переключатель (тап сворачивает/разворачивает)
    // + список карточек, когда раскрыт. Ближайший по времени бакет открыт по
    // умолчанию (см. BODY.recurring), дальний свёрнут.
    function recBucketSection(payday, bucket, expanded, days) {
      const when = days === 0 ? 'сегодня' : `через ${days} дн.`;
      const header = `<button data-bucket="${payday}" style="display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:0.35rem 0;cursor:pointer;color:#f0f0f0;text-align:left;">
        <span style="display:flex;align-items:baseline;gap:0.6rem;">
          <span style="font-size:1.05rem;font-weight:600;letter-spacing:-0.01em;">${payday} число</span>
          <span style="opacity:0.4;font-size:0.75rem;">${when} · ${bucket.length}</span>
        </span>
        <span style="display:flex;opacity:0.5;transition:transform .3s ${SPRING};transform:rotate(${expanded ? 90 : 0}deg);">${svg('chevR', 16)}</span>
      </button>`;
      if (!expanded) return `<div>${header}</div>`;
      const rows = bucket.length
        ? bucket.map((item, i) => recRow(item, i)).join('')
        : `<div style="opacity:0.3;font-size:0.9rem;padding:0.4rem 0;">пусто</div>`;
      return `<div>${header}<div style="display:flex;flex-direction:column;gap:0.7rem;margin-top:0.75rem;">${rows}</div></div>`;
    }
    BODY.recurring = () => {
      const items = state.recurring || [];
      if (items.length === 0) {
        const msg = state.recurringLoaded ? 'нет платежей' : 'загрузка…';
        return `<div class="lbl-h" style="margin-bottom:1.75rem;">Платежи</div>
          <div style="opacity:0.3;padding:2rem 0;font-size:1.05rem;">${msg}</div>`;
      }
      const today = state.recToday || AppConfig.today();
      const overdue = items.filter((i) => i.status === 'overdue');
      const rest = items.filter((i) => i.status !== 'overdue');
      const d5 = daysBetweenYMD(today, nextPaydayYMD(today, 5, false));
      const d20 = daysBetweenYMD(today, nextPaydayYMD(today, 20, false));
      const nearest = d5 <= d20 ? 5 : 20;
      // Дефолт раскрытия: ближайший бакет открыт, дальний свёрнут. Сбрасывается
      // при каждой загрузке (recExpanded=null), ручной тап живёт до перезагрузки.
      if (!state.recExpanded) state.recExpanded = { 5: nearest === 5, 20: nearest === 20 };
      const order = nearest === 5 ? [5, 20] : [20, 5];
      const daysBy = { 5: d5, 20: d20 };
      let out = `<div class="lbl-h" style="margin-bottom:1.75rem;">Платежи</div>`;
      if (overdue.length) out += recOverdueSection(overdue);
      out += `<div style="display:flex;flex-direction:column;gap:1.1rem;">`;
      order.forEach((p) => {
        const bucket = rest.filter((i) => Number(i.payday) === p);
        out += recBucketSection(p, bucket, !!state.recExpanded[p], daysBy[p]);
      });
      out += `</div>`;
      return out;
    };
    WIRE.recurring = () => {
      document.querySelectorAll('#screen [data-bucket]').forEach((b) =>
        b.addEventListener('click', () => {
          const p = Number(b.dataset.bucket);
          if (!state.recExpanded) state.recExpanded = {};
          state.recExpanded[p] = !state.recExpanded[p];
          renderBody();
        }));
      document.querySelectorAll('#screen [data-id]').forEach((b) =>
        b.addEventListener('click', () => openPaySheet(b.dataset.id)));
    };
    async function loadRecurring() {
      if (!AppConfig.token()) { openSettings(); return; }
      try {
        const res = await api('GET', '/api/recurring');
        if (!res.ok) return;
        const data = await res.json();
        AppConfig.cacheFrom(data); // синхронизировать зону с сервером
        state.recurring = Array.isArray(data.items) ? data.items : [];
        state.recToday = data.today || AppConfig.today();     // YMD в таймзоне (от бэка)
        state.recLead = (typeof data.lead === 'number') ? data.lead : 3;
        state.recExpanded = null;                             // пересчитать дефолт раскрытия
        state.recurringLoaded = true;
        if (state.screen === 'recurring') renderBody();
      } catch {}
    }

    // ── Bottom-sheet оплаты (payday-модель; монтируется в #paysheet-host) ──
    // Поле суммы — по умолчанию норма (item.amount), правится. Действия:
    //   «Оплатил»          → POST /pay {full:true}  — закрыть цикл (статус paid)
    //   «Внести часть»     → POST /pay {amount:x}   — частичная (paid_amount += x)
    //   «Перенести → 5/20» → PATCH {defer_to} на дату ближайшего наступления payday
    // Тело кредита в этом экране не ведём (правило 8): никакого owed/долга.
    function openPaySheet(id) {
      const item = (state.recurring || []).find((x) => x.id === id);
      if (!item) return;
      state.paySheet = { id, submitting: false };
      renderPaySheet();
    }
    function closePaySheet() { state.paySheet = null; renderPaySheet(); }
    function renderPaySheet() {
      const host = el('paysheet-host');
      if (!state.paySheet) { host.innerHTML = ''; return; }
      const item = (state.recurring || []).find((x) => x.id === state.paySheet.id);
      if (!item) { host.innerHTML = ''; return; }
      const cur = curSymbol(item.currency);
      const today = state.recToday || AppConfig.today();
      const sub = recSub(item) || (item.payday + ' число');
      // Перенос целиком на ближайшее СТРОГО будущее наступление выбранного payday
      // (strict=true → своя дата уходит в следующий месяц, чужая — в этом/следующем).
      const deferBtn = (p) => {
        const to = nextPaydayYMD(today, p, true);
        return `<button data-defer="${p}" data-date="${to}" style="flex:1;background:transparent;color:#f0f0f0;border:1px solid #262626;border-radius:4px;padding:0.85rem 0.5rem;font-size:0.85rem;font-weight:600;letter-spacing:0.01em;cursor:pointer;transition:transform .42s ${SPRING},opacity .18s ease;">→ ${p} число</button>`;
      };
      const amtVal = (item.amount != null && item.amount !== '') ? item.amount : '';
      host.innerHTML = `<div id="pay-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fadeIn .2s ease;">
        <div id="pay-sheet" style="width:100%;max-width:480px;background:#0e0e0e;border-top:1px solid #1f1f1f;border-radius:12px 12px 0 0;padding:1.75rem 1.6rem calc(env(safe-area-inset-bottom) + 1.6rem);animation:modalIn .32s cubic-bezier(0.34,1.4,0.64,1);">
          <div class="lbl-h" style="margin-bottom:0.5rem;">${ea(item.name || item.id)}</div>
          <div style="opacity:0.5;font-size:0.85rem;margin-bottom:1.75rem;">${ea(sub)}</div>
          <div id="pay-field" style="margin-bottom:1.75rem;"><div class="lbl-f" style="margin-bottom:0.6rem;">Сумма</div>
            <div id="pay-underline" style="display:flex;align-items:baseline;gap:0.4rem;border-bottom:2px solid #262626;padding-bottom:0.5rem;transition:border-color .2s ease;">
              <input id="pay-amount" value="${ea(amtVal)}" placeholder="0" inputmode="decimal" autocomplete="off" style="flex:1;min-width:0;background:transparent;border:none;padding:0;font-size:2rem;font-weight:600;letter-spacing:-0.02em;color:#f0f0f0;font-variant-numeric:tabular-nums;">
              <span style="opacity:0.4;font-size:1.1rem;">${cur}</span>
            </div></div>
          <button id="pay-full" style="width:100%;background:${ACC};color:#0a0a0a;border:none;border-radius:4px;padding:1.2rem;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:0.02em;cursor:pointer;transition:transform .42s ${SPRING},box-shadow .3s,opacity .18s ease;margin-bottom:0.8rem;">Оплатил</button>
          <button id="pay-part" style="width:100%;background:transparent;color:#f0f0f0;border:1px solid #262626;border-radius:4px;padding:1.1rem;font-size:0.95rem;font-weight:600;text-transform:uppercase;letter-spacing:0.02em;cursor:pointer;transition:transform .42s ${SPRING},opacity .18s ease;margin-bottom:1.6rem;">Внести часть</button>
          <div class="lbl-f" style="margin-bottom:0.6rem;">Перенести</div>
          <div style="display:flex;gap:0.7rem;">${deferBtn(5)}${deferBtn(20)}</div>
        </div></div>`;
      el('pay-overlay').addEventListener('click', closePaySheet);
      el('pay-sheet').addEventListener('click', (e) => e.stopPropagation());
      const amt = el('pay-amount'), underline = el('pay-underline');
      amt.addEventListener('focus', () => { underline.style.borderBottomColor = ACC; });
      amt.addEventListener('blur', () => { underline.style.borderBottomColor = '#262626'; });
      const full = el('pay-full');
      full.addEventListener('click', () => submitPay('full'));
      pressBtn(full);
      const part = el('pay-part');
      part.addEventListener('click', () => submitPay('partial'));
      pressBtn(part, 'scale(0.96)');
      document.querySelectorAll('#pay-sheet [data-defer]').forEach((b) => {
        b.addEventListener('click', () => submitDefer(Number(b.dataset.defer), b.dataset.date));
        pressBtn(b, 'scale(0.96)');
      });
    }
    // POST /api/recurring/:id/pay → {full:true} (полная) или {amount:x} (частичная).
    // Ответ {item, prev}: item обновляет строку в стейте, prev — для undo. Кнопки
    // блокируются от двойного тапа. Balances не трогаем (правило 8).
    async function submitPay(mode) {
      const ps = state.paySheet;
      if (!ps || ps.submitting) return;
      const item = (state.recurring || []).find((x) => x.id === ps.id);
      if (!item) return;
      let body;
      if (mode === 'full') {
        body = { full: true };
      } else {
        const amt = parseAmount(el('pay-amount').value);
        if (amt === null) { showToast('Введи сумму'); return; }
        body = { amount: amt };
      }
      const btns = ['pay-full', 'pay-part'].map(el);
      const setBusy = (busy) => btns.forEach((b) => { if (b) { b.disabled = busy; b.style.opacity = busy ? '0.5' : '1'; } });
      ps.submitting = true;
      setBusy(true);
      try {
        const res = await api('POST', `/api/recurring/${encodeURIComponent(ps.id)}/pay`, body);
        if (!res.ok) {
          let d = ''; try { d = (await res.json()).error || ''; } catch {}
          showToast('Ошибка ' + res.status + (d ? ' · ' + d : ''));
          ps.submitting = false; setBusy(false);
          return;
        }
        const data = await res.json();
        state.pendingRecurringUndo = { id: ps.id, prev: data.prev || null };
        const idx = state.recurring.findIndex((x) => x.id === ps.id);
        if (idx >= 0 && data.item) state.recurring[idx] = data.item;
        closePaySheet();
        if (state.screen === 'recurring') renderBody(); // статус/секция «Просрочено» пересчитаются
        showToast(recPaySummary(item, body), state.pendingRecurringUndo.prev ? { undo: undoRecurring } : {});
      } catch {
        showToast('Нет соединения');
        ps.submitting = false; setBusy(false);
      }
    }
    // Перенос целиком: PATCH /api/recurring/:id {defer_to:'YYYY-MM-DD'}. Двигает
    // срок платежа, суммы между месяцами не складываются (первая версия модели).
    // Перезагружаем список — статусы/бакеты считает бэк.
    async function submitDefer(payday, date) {
      const ps = state.paySheet;
      if (!ps || ps.submitting) return;
      const item = (state.recurring || []).find((x) => x.id === ps.id);
      if (!item) return;
      ps.submitting = true;
      document.querySelectorAll('#pay-sheet button').forEach((b) => { b.disabled = true; b.style.opacity = '0.5'; });
      try {
        const res = await api('PATCH', `/api/recurring/${encodeURIComponent(ps.id)}`, { defer_to: date });
        if (!res.ok) {
          let d = ''; try { d = (await res.json()).error || ''; } catch {}
          showToast('Ошибка ' + res.status + (d ? ' · ' + d : ''));
          ps.submitting = false; renderPaySheet();
          return;
        }
        closePaySheet();
        showToast(`${item.name || item.id} · перенос на ${fmtDate(date)}`);
        loadRecurring();
      } catch {
        showToast('Нет соединения');
        ps.submitting = false; renderPaySheet();
      }
    }
    function recPaySummary(item, body) {
      const nm = item.name || item.id;
      if (body.full) return `${nm} · оплачено`;
      return `${nm} · внесено ${disp(body.amount, curSymbol(item.currency))}`;
    }
    // Undo оплаты: PATCH сырым prev из ответа /pay (сырые поля строки Recurring —
    // paid_amount, cycle, last_paid, defer_to — как были ДО оплаты), затем перезагрузка.
    async function undoRecurring() {
      const u = state.pendingRecurringUndo;
      if (!u || !u.prev) return;
      try { await api('PATCH', `/api/recurring/${encodeURIComponent(u.id)}`, u.prev); } catch {}
      state.pendingRecurringUndo = null;
      loadRecurring();
    }

    // ── TOAST ───────────────────────────────────────────────────────────
    // Обобщён: showToast принимает opts.undo — колбэк отмены (undoLast для
    // событий, undoRecurring для платежей). Кнопка «Отменить» зовёт его по
    // контексту; без колбэка кнопки нет.
    function showToast(text, opts = {}) {
      if (toastTimer) clearTimeout(toastTimer);
      state.toast = text;
      state.toastUndo = typeof opts.undo === 'function' ? opts.undo : null;
      renderToast();
      toastTimer = setTimeout(() => { state.toast = null; state.toastUndo = null; renderToast(); }, 5000);
    }
    function renderToast() {
      const host = el('toast-host');
      if (!state.toast) { host.innerHTML = ''; return; }
      const undoBtn = state.toastUndo
        ? `<button id="toast-undo" style="flex-shrink:0;background:none;border:none;color:${ACC};font-weight:600;font-size:0.9rem;text-transform:uppercase;letter-spacing:0.02em;cursor:pointer;padding:0.2rem 0.3rem;">Отменить</button>`
        : '';
      host.innerHTML = `<div style="position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 1.5rem);transform:translateX(-50%);width:calc(100% - 3.2rem);max-width:420px;background:#141414;border:1px solid #232323;border-radius:6px;box-shadow:0 12px 40px -10px rgba(0,0,0,0.8);animation:toastIn .4s ${SPRING};z-index:40;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.1rem;">
          <span style="font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.85;">${ea(state.toast)}</span>
          ${undoBtn}
        </div>
        <div style="height:3px;background:${ACC};transform-origin:left;animation:barShrink 5s linear forwards;"></div>
      </div>`;
      if (state.toastUndo) {
        el('toast-undo').addEventListener('click', () => {
          if (toastTimer) clearTimeout(toastTimer);
          const fn = state.toastUndo;
          state.toast = null; state.toastUndo = null;
          renderToast();
          if (fn) fn();
        });
      }
    }

    // ── SETTINGS ────────────────────────────────────────────────────────
    function openSettings() { state.settingsOpen = true; renderSettings(); }
    function closeSettings() { state.settingsOpen = false; renderSettings(); }
    function renderSettings() {
      const host = el('settings-host');
      if (!state.settingsOpen) { host.innerHTML = ''; return; }
      host.innerHTML = `<div id="set-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fadeIn .2s ease;">
        <div id="set-sheet" style="width:100%;max-width:480px;background:#0e0e0e;border-top:1px solid #1f1f1f;border-radius:12px 12px 0 0;padding:1.75rem 1.6rem calc(env(safe-area-inset-bottom) + 1.6rem);animation:modalIn .32s cubic-bezier(0.34,1.4,0.64,1);">
          <div class="lbl-h" style="margin-bottom:1.75rem;">Настройки</div>
          <div style="margin-bottom:1.5rem;"><div class="lbl-f" style="margin-bottom:0.6rem;">Bearer-токен</div>
            <input id="set-token" value="${ea(AppConfig.token())}" placeholder="eyJhbGci…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" style="width:100%;background:transparent;border:none;border-bottom:1px solid #262626;border-radius:0;padding:0.4rem 0 0.6rem;font-size:0.95rem;color:#f0f0f0;font-family:ui-monospace,'SF Mono',Menlo,monospace;"></div>
          <div style="margin-bottom:2rem;"><div class="lbl-f" style="margin-bottom:0.6rem;">Часовой пояс</div>
            <select id="set-tz" style="width:100%;background:transparent;border:none;border-bottom:1px solid #262626;border-radius:0;padding:0.4rem 0 0.6rem;font-size:0.95rem;color:#f0f0f0;-webkit-appearance:none;appearance:none;"></select></div>
          <button id="set-save" style="width:100%;background:${ACC};color:#0a0a0a;border:none;border-radius:4px;padding:1.1rem;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:0.02em;cursor:pointer;transition:transform .42s ${SPRING};">Сохранить</button>
        </div></div>`;
      AppConfig.populateSelect(el('set-tz')); // зоны из config.js (AppConfig.ZONES), активная — из KV
      el('set-overlay').addEventListener('click', closeSettings);
      el('set-sheet').addEventListener('click', (e) => e.stopPropagation());
      const tok = el('set-token');
      tok.addEventListener('focus', () => { tok.style.borderBottomColor = ACC; });
      tok.addEventListener('blur', () => { tok.style.borderBottomColor = '#262626'; });
      const save = el('set-save');
      save.addEventListener('click', async () => {
        localStorage.setItem('appToken', el('set-token').value.trim()); // токен в localStorage['appToken']
        await AppConfig.saveTimezone(el('set-tz').value);               // PUT /api/config
        if (state.dayDate > AppConfig.today()) state.dayDate = AppConfig.today();
        closeSettings();
        refreshCurrent(); // подтянуть данные активного экрана под новый токен/зону
        flush();          // до-слать очередь трат
      });
      pressBtn(save, 'scale(0.94)'); // без кольца-подсветки — как в макете
    }

    // Пружина «нажатия» для крупных teal-кнопок (+ подсветка-кольцо на некоторых).
    function pressBtn(node, transform) {
      const t = transform || 'scale(0.94)';
      const ring = !transform;
      const down = () => { node.style.transform = t; if (ring) node.style.boxShadow = '0 0 0 6px rgba(10,186,181,0.25)'; };
      const up = () => { node.style.transform = ''; if (ring) node.style.boxShadow = ''; };
      node.addEventListener('pointerdown', down);
      node.addEventListener('pointerup', up);
      node.addEventListener('pointerleave', up);
      node.addEventListener('pointercancel', up);
    }

    // ── Сеть: общий fetch с Bearer ──────────────────────────────────────
    function api(method, path, body) {
      const opts = { method, headers: { Authorization: `Bearer ${AppConfig.token()}` } };
      if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      return fetch(path, opts);
    }
    function fmtTime(iso) {
      try { return new Intl.DateTimeFormat('ru-RU', { timeZone: AppConfig.tz(), hour: '2-digit', minute: '2-digit' }).format(new Date(iso)); } catch { return ''; }
    }
    function addDays(dateStr, n) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      dt.setUTCDate(dt.getUTCDate() + n);
      const p2 = (x) => String(x).padStart(2, '0');
      return `${dt.getUTCFullYear()}-${p2(dt.getUTCMonth() + 1)}-${p2(dt.getUTCDate())}`;
    }
    const parseAmount = (s) => { const n = parseFloat(String(s || '').replace(/\s/g, '').replace(',', '.')); return isFinite(n) && n > 0 ? n : null; };

    // ── Балансы ─────────────────────────────────────────────────────────
    const accSig = () => JSON.stringify((state.accounts || []).map((a) => [a.id, a.amount, a.currency, a.name, a.hidden]));
    function applyBalances(data) {
      state.accounts = Array.isArray(data.accounts) ? data.accounts : [];
      state.primary = data.primary || null;
      state.balUpdatedAt = data.updated_at || null;
      state.accountsLoaded = true;
      const sig = accSig();
      // Точечный ре-рендер: на balances всегда; на events — только если состав
      // счетов изменился (иначе бы затирали ввод пользователя фоновым refresh'ем).
      if (state.screen === 'balances') renderBody();
      else if (state.screen === 'events' && sig !== lastAccSig) renderBody();
      lastAccSig = sig;
    }
    // Балансы из ответа события/undo ({accounts,updated_at}) — обновить кэш и стейт.
    function applyBalancesObj(bal) {
      if (!bal || !Array.isArray(bal.accounts)) return;
      state.accounts = bal.accounts;
      if (bal.updated_at) state.balUpdatedAt = bal.updated_at;
      const prev = readLS('cache:balances') || {};
      writeLS('cache:balances', { ...prev, accounts: bal.accounts, updated_at: bal.updated_at || prev.updated_at });
      lastAccSig = accSig();
    }
    async function loadBalances() {
      if (!AppConfig.token()) { openSettings(); return; }
      try {
        const res = await api('GET', '/api/balances');
        if (!res.ok) return;
        const data = await res.json();
        AppConfig.cacheFrom(data); // синхронизировать зону с сервером
        writeLS('cache:balances', data);
        applyBalances(data);
      } catch {}
    }

    // ── День ────────────────────────────────────────────────────────────
    async function loadDay(date) {
      const cached = readLS('cache:day:' + date);
      if (cached && !state.dayData[date]) {
        state.dayData[date] = cached;
        if (state.screen === 'day' && state.dayDate === date) renderBody();
      }
      if (!AppConfig.token()) { openSettings(); return; }
      try {
        const res = await api('GET', '/api/day?date=' + encodeURIComponent(date));
        if (!res.ok) return;
        const data = await res.json();
        AppConfig.cacheFrom(data);
        state.dayData[date] = data;
        writeLS('cache:day:' + date, data);
        if (state.screen === 'day' && state.dayDate === date) renderBody();
      } catch {}
    }

    // ── Событие: summary для тоста + undo ────────────────────────────────
    function eventSummary(ev) {
      const nm = (id) => { const a = state.accounts.find((x) => x.id === id); return a ? a.name : id; };
      const u = (id) => { const a = state.accounts.find((x) => x.id === id); return a ? curSymbol(a.currency) : ''; };
      if (ev.type === 'income') return `${typeName.income} · ${nm(ev.to)} · ${fmt(ev.amount)} ${u(ev.to)}`;
      if (ev.type === 'expense') return `${typeName.expense} · ${nm(ev.from)} · ${fmt(ev.amount)} ${u(ev.from)}`;
      if (ev.type === 'transfer') return `${typeName.transfer} · ${nm(ev.from)} → ${nm(ev.to)} · ${fmt(ev.amount)} ${u(ev.from)}`;
      if (ev.type === 'exchange') return `${typeName.exchange} · ${fmt(ev.amount)} ${u(ev.from)} → ${fmt(ev.amount_to)} ${u(ev.to)}`;
      return typeName[ev.type] || 'Записано';
    }
    async function undoLast() {
      if (!state.pendingUndoEventId) return;
      try {
        const res = await api('DELETE', '/api/event/last');
        if (res.ok) { const data = await res.json(); applyBalancesObj(data.balances); }
      } catch {}
      state.pendingUndoEventId = null;
      if (state.screen === 'balances' || state.screen === 'events') renderBody();
    }

    // ── Оффлайн-очередь трат (семантика web/app.js) ─────────────────────
    const genClientId = () => (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : `c_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 10)}`;
    const getQueue = () => { try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch { return []; } };
    const setQueue = (q) => { try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch {} };
    function enqueue(text) { const q = getQueue(); q.push({ text, queuedAt: new Date().toISOString(), client_id: genClientId() }); setQueue(q); }
    async function tryPost(item) {
      if (!AppConfig.token()) return { ok: false };
      try {
        // Шлём ВРЕМЯ ЗАХВАТА (queuedAt), не флаша — отложенный flush не должен
        // датировать трату днём отправки.
        const res = await api('POST', '/api/expense', { text: item.text, now: item.queuedAt || new Date().toISOString(), client_id: item.client_id });
        if (res.ok) return { ok: true };
        return { ok: false, status: res.status };
      } catch { return { ok: false, networkError: true }; }
    }
    let flushing = false;
    async function flush() {
      if (flushing) return;
      flushing = true;
      try {
        let q = getQueue();
        while (q.length > 0) {
          const item = q[0];
          if (!item.client_id) { item.client_id = genClientId(); setQueue(q); }
          const r = await tryPost(item);
          if (r.ok) { q.shift(); setQueue(q); }
          else if (r.status && r.status >= 400 && r.status < 500) { q.shift(); setQueue(q); } // невалидная — выкинуть
          else break; // сеть/5xx — оставить, повторим позже
        }
      } finally { flushing = false; }
    }

    // Обновить данные активного экрана (смена токена/зоны, focus/pageshow).
    function refreshCurrent() {
      if (state.screen === 'balances' || state.screen === 'events') loadBalances();
      else if (state.screen === 'day') loadDay(state.dayDate);
    }

    // Реестры тел/врайров экранов (заполняются выше как BODY.x/WIRE.x).
    function BODY() {}
    function WIRE() {}

    // стрелки ←/→ листают дни (даты по активной зоне; next заблокирован на «сегодня»)
    window.addEventListener('keydown', (e) => {
      if (state.screen !== 'day') return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); state.dayDate = addDays(state.dayDate, -1); renderBody(); loadDay(state.dayDate); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); if (state.dayDate < AppConfig.today()) { state.dayDate = addDays(state.dayDate, 1); renderBody(); loadDay(state.dayDate); } }
    });

    // Триггеры очереди + обновление активного экрана.
    window.addEventListener('online', flush);
    window.addEventListener('focus', () => { flush(); refreshCurrent(); });
    window.addEventListener('pageshow', () => { flush(); refreshCurrent(); });
    setInterval(flush, 30000);

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

    mount();
    AppConfig.fetchConfig();                // синхронизировать зону с сервером (best-effort)
    if (!AppConfig.token()) openSettings();  // нет токена — сразу открыть настройки
    flush();                                 // до-слать всё, что осталось в очереди
  })();
  </script>
</body>
</html>
